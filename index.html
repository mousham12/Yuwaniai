<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Yuwani AI · Neutral · Factual · Collapsible History</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Orbitron', 'Courier New', monospace;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    /* THEME VARIABLES */
    :root {
      --bg-gradient-start: #0a0f1e;
      --bg-gradient-end: #03060c;
      --sidebar-bg: rgba(5, 12, 22, 0.92);
      --chat-bg: rgba(10, 14, 23, 0.82);
      --header-bg: rgba(0, 20, 30, 0.85);
      --input-bg: #05161f;
      --bubble-user: linear-gradient(135deg, #0a2f3f, #06212e);
      --bubble-bot: rgba(20, 30, 45, 0.9);
      --text-color: #eef5ff;
      --text-muted: #8aacdd;
      --border-glow: rgba(0, 255, 255, 0.5);
      --neon-color: #0ff;
      --accent-pink: #ff66ccaa;
      --disclaimer-color: #ffaa66;
    }

    body.light-theme {
      --bg-gradient-start: #e8f0ff;
      --bg-gradient-end: #d0dcf0;
      --sidebar-bg: rgba(240, 248, 255, 0.95);
      --chat-bg: rgba(255, 255, 255, 0.92);
      --header-bg: rgba(220, 240, 255, 0.9);
      --input-bg: #ffffff;
      --bubble-user: linear-gradient(135deg, #b8e1fc, #9ac9f0);
      --bubble-bot: #f0f4fa;
      --text-color: #1a2a3f;
      --text-muted: #5a6e8a;
      --border-glow: #3399ff;
      --neon-color: #2288ff;
      --accent-pink: #ff66aa;
      --disclaimer-color: #cc7700;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, var(--bg-gradient-start), var(--bg-gradient-end));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app-container {
      display: flex;
      gap: 18px;
      width: 100%;
      max-width: 1500px;
      height: 90vh;
      min-height: 680px;
      position: relative;
    }

    /* SIDEBAR - COLLAPSIBLE */
    .sidebar {
      width: 290px;
      background: var(--sidebar-bg);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      border: 1px solid var(--neon-color);
      box-shadow: 0 0 20px rgba(0,255,255,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .sidebar.collapsed {
      width: 70px;
      min-width: 70px;
    }

    .sidebar.collapsed .sidebar-header h3,
    .sidebar.collapsed .chat-name,
    .sidebar.collapsed .chat-preview,
    .sidebar.collapsed .new-chat-btn span {
      display: none;
    }

    .sidebar.collapsed .new-chat-btn {
      font-size: 1.5rem;
      padding: 10px 0;
      text-align: center;
    }

    .sidebar.collapsed .chat-item {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px 0;
    }

    .sidebar.collapsed .delete-chat-btn {
      display: none;
    }

    .sidebar-toggle {
      position: absolute;
      right: -12px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--neon-color);
      border: none;
      width: 28px;
      height: 48px;
      border-radius: 20px;
      cursor: pointer;
      color: black;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      box-shadow: 0 0 10px var(--neon-color);
      transition: 0.2s;
    }

    .sidebar-toggle:hover {
      transform: translateY(-50%) scale(1.05);
      width: 32px;
    }

    .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid var(--neon-color);
      background: rgba(0,20,30,0.6);
    }

    .sidebar-header h3 {
      color: var(--neon-color);
      font-size: 1.2rem;
      white-space: nowrap;
    }

    .new-chat-btn {
      background: linear-gradient(145deg, #0c2a38, #021016);
      border: 1px solid var(--neon-color);
      border-radius: 40px;
      padding: 10px;
      width: 100%;
      margin-top: 12px;
      color: var(--neon-color);
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
      overflow: hidden;
    }

    body.light-theme .new-chat-btn {
      background: linear-gradient(145deg, #c0ddf5, #a8c4e0);
      color: #0066aa;
    }

    .new-chat-btn:hover { background: var(--neon-color); color: black; box-shadow: 0 0 12px var(--neon-color); }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .chat-item {
      background: rgba(0, 30, 40, 0.6);
      border-radius: 20px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      border-left: 3px solid var(--neon-color);
      position: relative;
      transition: 0.1s;
      color: var(--text-color);
    }

    body.light-theme .chat-item { background: rgba(200, 220, 240, 0.7); }
    .chat-item:hover { background: var(--neon-color)22; }
    .chat-item.active { background: var(--neon-color)33; border-left: 4px solid #f0f; }
    .chat-name { font-weight: bold; color: var(--neon-color); font-size: 0.85rem; word-break: break-word; padding-right: 30px; }
    .chat-preview { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .delete-chat-btn {
      position: absolute;
      right: 8px;
      top: 8px;
      background: #ff3366aa;
      border: none;
      border-radius: 20px;
      color: white;
      font-size: 0.7rem;
      padding: 2px 8px;
      cursor: pointer;
      opacity: 0.7;
    }
    .delete-chat-btn:hover { opacity: 1; background: #ff3366; }

    /* MAIN CHAT */
    .neon-chat-container {
      flex: 1;
      background: var(--chat-bg);
      backdrop-filter: blur(14px);
      border-radius: 38px;
      border: 1px solid var(--border-glow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: var(--header-bg);
      padding: 14px 20px;
      border-bottom: 1px solid var(--neon-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand-area {
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }

    .yuwani-brand {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff66ff, #0ff, #ff44aa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 8px rgba(255,68,255,0.5);
      letter-spacing: 1px;
    }

    .user-greeting {
      font-size: 0.85rem;
      color: var(--neon-color);
      background: rgba(0,255,255,0.15);
      padding: 4px 12px;
      border-radius: 40px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .ctrl-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--neon-color);
      width: 36px;
      height: 36px;
      border-radius: 30px;
    }

    .ctrl-btn:hover { background: var(--neon-color)33; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: fadeSlide 0.2s ease;
      position: relative;
    }

    .user-message { align-self: flex-end; }
    .bot-message { align-self: flex-start; }

    .bubble {
      padding: 10px 16px;
      border-radius: 22px;
      word-wrap: break-word;
      font-size: 0.93rem;
      color: var(--text-color);
    }

    .user-message .bubble { background: var(--bubble-user); border: 1px solid var(--neon-color); border-bottom-right-radius: 6px; }
    .bot-message .bubble { background: var(--bubble-bot); border: 1px solid var(--accent-pink); border-bottom-left-radius: 6px; }
    .message-time { font-size: 0.6rem; color: var(--text-muted); margin: 4px 10px 0; }

    .edit-btn {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--neon-color)77;
      border: none;
      border-radius: 20px;
      font-size: 0.7rem;
      padding: 2px 8px;
      cursor: pointer;
      color: var(--neon-color);
      opacity: 0;
    }

    .user-message:hover .edit-btn { opacity: 1; }

    .chat-input-area {
      background: var(--header-bg);
      border-top: 1px solid var(--neon-color);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .chat-input-area input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--neon-color);
      border-radius: 48px;
      padding: 12px 18px;
      color: var(--text-color);
      outline: none;
    }

    .action-btn {
      background: #0c2a38;
      border: 1px solid var(--neon-color);
      border-radius: 40px;
      padding: 10px 20px;
      color: var(--neon-color);
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
    }

    body.light-theme .action-btn { background: #c0ddf5; color: #0066aa; }
    .action-btn:hover { background: var(--neon-color); color: black; box-shadow: 0 0 10px var(--neon-color); }

    .ai-disclaimer {
      font-size: 0.7rem;
      text-align: center;
      color: var(--disclaimer-color);
      background: rgba(0,0,0,0.3);
      padding: 6px 12px;
      border-radius: 40px;
      width: fit-content;
      margin: 0 auto;
      letter-spacing: 0.5px;
    }

    .image-preview { max-width: 180px; max-height: 140px; border-radius: 16px; margin-top: 6px; border: 1px solid var(--neon-color); }
    .typing-indicator { display: flex; gap: 6px; padding: 8px 14px; background: var(--bubble-bot); border-radius: 28px; width: fit-content; }
    .typing-indicator span { width: 8px; height: 8px; background: var(--neon-color); border-radius: 50%; animation: pulse 1.2s infinite; }

    @keyframes pulse { 0%,100%{ opacity:0.3; } 50%{ opacity:1; transform:scale(1.2); background:#f0f; } }
    @keyframes fadeSlide { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .modal-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%; background: #000a; backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; z-index: 2000; visibility: hidden;
    }
    .modal-overlay.active { visibility: visible; }
    .name-modal, .image-gen-modal {
      background: var(--chat-bg);
      border: 2px solid var(--neon-color);
      border-radius: 32px;
      padding: 28px;
      width: 360px;
      text-align: center;
      color: var(--text-color);
    }
    .image-gen-modal { width: 420px; }
    input, textarea { background: var(--input-bg); border: 1px solid var(--neon-color); padding: 10px; border-radius: 24px; width: 100%; margin: 12px 0; color: var(--text-color); }
    .gen-img-preview { max-width: 100%; border-radius: 20px; margin-top: 12px; border: 1px solid var(--neon-color); }
  </style>
</head>
<body>
<div class="app-container">
  <!-- Collapsible Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>💬 CHAT HISTORY</h3>
      <button class="new-chat-btn" id="newChatBtn">+ NEW CHAT</button>
    </div>
    <div class="chat-list" id="chatList"></div>
  </div>
  <button class="sidebar-toggle" id="sidebarToggleBtn" title="Toggle History">◀</button>

  <!-- Main Chat -->
  <div class="neon-chat-container">
    <div class="chat-header">
      <div class="brand-area">
        <div class="yuwani-brand">✨ YUWANI AI ✨</div>
        <div class="user-greeting" id="greetingDisplay">👤 Welcome</div>
      </div>
      <div class="header-actions">
        <button class="ctrl-btn" id="themeToggleBtn" title="Light/Dark Theme">🌓</button>
        <button class="ctrl-btn" id="voiceBtn" title="Voice Input">🎤</button>
        <button class="ctrl-btn" id="imageGenBtn" title="Generate Image">🖼️✨</button>
        <button class="ctrl-btn" id="minimizeBtn">─</button>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <div class="input-group">
        <input type="text" id="userInput" placeholder="Type or speak...">
        <button class="action-btn" id="sendButton">➤ SEND</button>
      </div>
      <div class="ai-disclaimer">
        ⚡ AI can make mistakes. Verify important info. Neutral & factual. ⚡
      </div>
    </div>
  </div>
</div>

<!-- Name Modal -->
<div id="nameModal" class="modal-overlay">
  <div class="name-modal"><h3 style="color:var(--neon-color)">✨ YOUR IDENTITY</h3><input id="userNameInput" placeholder="Your name"><button id="saveNameBtn" style="background:var(--neon-color); border:none; padding:8px 20px; border-radius:40px;">Start Chat</button></div>
</div>

<!-- Image Generation Modal -->
<div id="imageGenModal" class="modal-overlay">
  <div class="image-gen-modal"><h3 style="color:var(--neon-color)">🎨 Generate Image</h3><input id="imagePromptInput" placeholder="Describe image... e.g., neon cyberpunk cat"><button id="generateImageBtn" style="background:var(--neon-color); margin:8px;">✨ Generate</button><div id="generatedImageContainer"></div><button id="closeGenModal" style="margin-top:10px;">Close</button></div>
</div>

<script>
  // ---------- CONFIG ----------
  const OPENROUTER_API_KEY = "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";
  let currentUserName = localStorage.getItem('neon_user_name') || '';
  let currentChatId = null;
  let isProcessing = false;
  let typingIndicator = null;
  let mediaRecorder = null;
  let audioChunks = [];

  // Sidebar Toggle Logic
  const sidebar = document.getElementById('sidebar');
  const sidebarToggleBtn = document.getElementById('sidebarToggleBtn');
  let isSidebarCollapsed = localStorage.getItem('sidebar_collapsed') === 'true';

  function toggleSidebar() {
    isSidebarCollapsed = !isSidebarCollapsed;
    if (isSidebarCollapsed) {
      sidebar.classList.add('collapsed');
      sidebarToggleBtn.innerHTML = '▶';
      sidebarToggleBtn.title = 'Open History';
    } else {
      sidebar.classList.remove('collapsed');
      sidebarToggleBtn.innerHTML = '◀';
      sidebarToggleBtn.title = 'Close History';
    }
    localStorage.setItem('sidebar_collapsed', isSidebarCollapsed);
  }

  if (isSidebarCollapsed) {
    sidebar.classList.add('collapsed');
    sidebarToggleBtn.innerHTML = '▶';
  } else {
    sidebarToggleBtn.innerHTML = '◀';
  }
  sidebarToggleBtn.addEventListener('click', toggleSidebar);

  // Theme Management
  function initTheme() {
    const savedTheme = localStorage.getItem('neon_theme') || 'dark';
    if (savedTheme === 'light') {
      document.body.classList.add('light-theme');
    } else {
      document.body.classList.remove('light-theme');
    }
  }
  function toggleTheme() {
    if (document.body.classList.contains('light-theme')) {
      document.body.classList.remove('light-theme');
      localStorage.setItem('neon_theme', 'dark');
    } else {
      document.body.classList.add('light-theme');
      localStorage.setItem('neon_theme', 'light');
    }
    if (currentChatId) renderCurrentChat();
  }
  document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);

  // Chat Database
  let chatDB = { chats: {}, order: [] };
  
  function loadChatDB() {
    const stored = localStorage.getItem('yuwani_chat_db');
    if(stored) { try { chatDB = JSON.parse(stored); if(!chatDB.chats) chatDB.chats = {}; if(!chatDB.order) chatDB.order = []; } catch(e){} }
    if(Object.keys(chatDB.chats).length === 0) createNewChat();
    renderChatList();
  }
  function saveChatDB() { localStorage.setItem('yuwani_chat_db', JSON.stringify(chatDB)); }
  
  function createNewChat() {
    const chatId = 'chat_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
    chatDB.chats[chatId] = { name: `📁 ${new Date().toLocaleString()}`, messages: [] };
    chatDB.order.unshift(chatId);
    saveChatDB();
    return chatId;
  }
  
  function deleteChat(chatId) {
    if(!chatDB.chats[chatId]) return;
    delete chatDB.chats[chatId];
    chatDB.order = chatDB.order.filter(id => id !== chatId);
    if(chatDB.order.length === 0) createNewChat();
    saveChatDB();
    if(currentChatId === chatId) switchChat(chatDB.order[0]);
    else renderChatList();
  }
  
  function renderChatList() {
    const container = document.getElementById('chatList');
    container.innerHTML = '';
    chatDB.order.forEach(chatId => {
      const chat = chatDB.chats[chatId];
      if(!chat) return;
      const div = document.createElement('div');
      div.className = `chat-item ${currentChatId === chatId ? 'active' : ''}`;
      div.innerHTML = `<div class="chat-name">${escapeHtml(chat.name)}</div><div class="chat-preview">${chat.messages.length? chat.messages[chat.messages.length-1].text.substring(0,40):'Empty'}</div><button class="delete-chat-btn" data-id="${chatId}">🗑️</button>`;
      div.querySelector('.delete-chat-btn').addEventListener('click', (e) => { e.stopPropagation(); if(confirm('Delete this chat?')) deleteChat(chatId); });
      div.addEventListener('click', () => switchChat(chatId));
      container.appendChild(div);
    });
  }
  
  function switchChat(chatId) {
    if(!chatDB.chats[chatId]) return;
    currentChatId = chatId;
    renderCurrentChat();
    renderChatList();
  }
  
  function renderCurrentChat() {
    const container = document.getElementById('chatMessages');
    container.innerHTML = '';
    const chat = chatDB.chats[currentChatId];
    if(!chat) return;
    chat.messages.forEach(msg => appendMessageToDOM(msg.text, msg.sender, msg.time, msg.id, msg.image));
    scrollToBottom();
  }
  
  function appendMessageToDOM(text, sender, time, msgId, imageBase64=null) {
    const container = document.getElementById('chatMessages');
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('message', sender === 'user' ? 'user-message' : 'bot-message');
    msgDiv.setAttribute('data-msg-id', msgId);
    const bubble = document.createElement('div');
    bubble.classList.add('bubble');
    if(imageBase64) {
      const img = document.createElement('img');
      img.src = imageBase64;
      img.className = 'image-preview';
      bubble.appendChild(img);
      bubble.appendChild(document.createElement('br'));
    }
    const textSpan = document.createElement('span');
    textSpan.innerText = text;
    bubble.appendChild(textSpan);
    msgDiv.appendChild(bubble);
    const timeSpan = document.createElement('div');
    timeSpan.classList.add('message-time');
    timeSpan.innerText = time;
    msgDiv.appendChild(timeSpan);
    if(sender === 'user') {
      const editBtn = document.createElement('button');
      editBtn.innerText = '✏️ Edit';
      editBtn.className = 'edit-btn';
      editBtn.onclick = (e) => { e.stopPropagation(); editUserMessage(msgId, text); };
      msgDiv.appendChild(editBtn);
    }
    container.appendChild(msgDiv);
    scrollToBottom();
  }
  
  function addMessageToChat(chatId, text, sender, image=null) {
    const msgId = Date.now() + '_' + Math.random();
    const time = new Date().toLocaleTimeString();
    const msg = { id: msgId, text, sender, time, image: image || null };
    if(!chatDB.chats[chatId]) return;
    chatDB.chats[chatId].messages.push(msg);
    const msgs = chatDB.chats[chatId].messages;
    const firstUserMsg = msgs.find(m => m.sender === 'user');
    if(firstUserMsg && msgs.filter(m=>m.sender==='user').length === 1) {
      let newName = firstUserMsg.text.substring(0, 30);
      if(newName.length>25) newName+='...';
      chatDB.chats[chatId].name = `💬 ${newName}`;
    }
    saveChatDB();
    if(chatId === currentChatId) appendMessageToDOM(text, sender, time, msgId, image);
    renderChatList();
  }
  
  async function editUserMessage(msgId, oldText) {
    const newText = prompt("Edit your message:", oldText);
    if(!newText || newText === oldText) return;
    const chat = chatDB.chats[currentChatId];
    const msgIndex = chat.messages.findIndex(m => m.id === msgId);
    if(msgIndex === -1) return;
    chat.messages = chat.messages.slice(0, msgIndex);
    saveChatDB();
    renderCurrentChat();
    await sendMessageToAI(newText);
  }
  
  async function sendMessageToAI(userMsg, imageAttachment=null) {
    if(isProcessing) return;
    isProcessing = true;
    document.getElementById('sendButton').disabled = true;
    document.getElementById('userInput').disabled = true;
    
    addMessageToChat(currentChatId, userMsg, 'user', imageAttachment);
    showTypingIndicator();
    try {
      const chat = chatDB.chats[currentChatId];
      const history = chat.messages.slice(-12).map(m => ({ role: m.sender === 'user' ? 'user' : 'assistant', content: m.text }));
      // NEUTRAL SYSTEM PROMPT - no over-promotion, factual about Nepal
      const systemPrompt = `You are YUWANI AI, a neutral, factual, and helpful assistant. You do not exaggerate or show bias. Provide balanced information. When asked about Nepal, state the area as 147,516 square kilometers (approximately). You may mention that Mount Everest is located there, but keep tone neutral. Avoid over-praising any country or entity. If unsure, say you don't know. The user's name is ${currentUserName}.`;
      const messages = [{ role: "system", content: systemPrompt }, ...history];
      const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST", headers: { "Authorization": `Bearer ${OPENROUTER_API_KEY}`, "Content-Type": "application/json" },
        body: JSON.stringify({ model: "deepseek/deepseek-chat-v3.1", messages, temperature: 0.7 })
      });
      if(!response.ok) throw new Error(`API ${response.status}`);
      const data = await response.json();
      let botReply = data.choices[0].message.content;
      // Ensure Nepal area is correct if mentioned, but without bias
      if(userMsg.toLowerCase().includes('nepal') && !botReply.toLowerCase().includes('147,516')) {
        botReply += `\n\nFor reference: Nepal's total area is approximately 147,516 square kilometers.`;
      }
      removeTypingIndicator();
      addMessageToChat(currentChatId, botReply, 'bot', null);
    } catch(err) {
      removeTypingIndicator();
      addMessageToChat(currentChatId, `⚠️ Yuwani AI error: ${err.message}`, 'bot', null);
    } finally {
      isProcessing = false;
      document.getElementById('sendButton').disabled = false;
      document.getElementById('userInput').disabled = false;
      document.getElementById('userInput').focus();
    }
  }
  
  // VOICE INPUT
  async function startVoiceInput() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
        const formData = new FormData();
        formData.append('audio', audioBlob, 'speech.wav');
        formData.append('model', 'whisper-1');
        const response = await fetch("https://openrouter.ai/api/v1/audio/transcriptions", {
          method: "POST",
          headers: { "Authorization": `Bearer ${OPENROUTER_API_KEY}` },
          body: formData
        });
        if(response.ok) {
          const data = await response.json();
          const transcribed = data.text || "Sorry, couldn't understand.";
          document.getElementById('userInput').value = transcribed;
        } else { alert("Voice recognition error"); }
        stream.getTracks().forEach(track => track.stop());
      };
      mediaRecorder.start();
      setTimeout(() => { if(mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); }, 5000);
      alert("🎤 Speak now... (5 sec max)");
    } catch(e) { alert("Microphone access needed"); }
  }
  
  // IMAGE GENERATION (Neutral)
  async function generateImage(prompt) {
    const modalImgContainer = document.getElementById('generatedImageContainer');
    modalImgContainer.innerHTML = '<p style="color:var(--neon-color)">✨ Generating...</p>';
    try {
      const response = await fetch(`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512&nologo=true`);
      if(response.ok) {
        const imgUrl = response.url;
        modalImgContainer.innerHTML = `<img src="${imgUrl}" class="gen-img-preview" style="max-width:100%"><br><button id="sendImageToChat" style="margin-top:8px; background:var(--neon-color);">📎 Send to Chat</button>`;
        document.getElementById('sendImageToChat')?.addEventListener('click', () => {
          addMessageToChat(currentChatId, `🎨 Generated: ${prompt}`, 'user', imgUrl);
          closeImageModal();
          sendMessageToAI(`I generated an image: ${prompt}`);
        });
      } else throw new Error('Gen failed');
    } catch(err) {
      modalImgContainer.innerHTML = `<p style="color:red">Failed: ${err.message}</p>`;
    }
  }
  
  function showImageModal() { document.getElementById('imageGenModal').classList.add('active'); }
  function closeImageModal() { document.getElementById('imageGenModal').classList.remove('active'); }
  
  function showTypingIndicator() {
    removeTypingIndicator();
    const div = document.createElement('div');
    div.classList.add('message', 'bot-message');
    div.id = 'typingDiv';
    div.innerHTML = `<div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
    document.getElementById('chatMessages').appendChild(div);
    scrollToBottom();
    typingIndicator = div;
  }
  function removeTypingIndicator() { if(typingIndicator) typingIndicator.remove(); typingIndicator=null; }
  function scrollToBottom() { const c = document.getElementById('chatMessages'); c.scrollTop = c.scrollHeight; }
  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;';}); }
  
  // Event bindings
  document.getElementById('sendButton').addEventListener('click', () => {
    const msg = document.getElementById('userInput').value.trim();
    if(msg && !isProcessing) { document.getElementById('userInput').value = ''; sendMessageToAI(msg); }
  });
  document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key==='Enter') document.getElementById('sendButton').click(); });
  document.getElementById('newChatBtn').addEventListener('click', () => { const nid = createNewChat(); switchChat(nid); });
  document.getElementById('voiceBtn').addEventListener('click', startVoiceInput);
  document.getElementById('imageGenBtn').addEventListener('click', showImageModal);
  document.getElementById('generateImageBtn').addEventListener('click', () => { const p = document.getElementById('imagePromptInput').value; if(p) generateImage(p); });
  document.getElementById('closeGenModal').addEventListener('click', closeImageModal);
  document.getElementById('minimizeBtn').addEventListener('click', () => {
    const cont = document.querySelector('.neon-chat-container');
    const isMin = cont.style.height === '70px';
    cont.style.height = isMin ? '' : '70px';
    cont.style.minHeight = isMin ? '' : '70px';
  });
  
  // Name modal & init
  function initUser() {
    if(!currentUserName) {
      document.getElementById('nameModal').classList.add('active');
      document.getElementById('saveNameBtn').onclick = () => {
        const name = document.getElementById('userNameInput').value.trim();
        if(name) {
          currentUserName = name;
          localStorage.setItem('neon_user_name', name);
          document.getElementById('greetingDisplay').innerHTML = `👤 ${escapeHtml(name)}`;
          document.getElementById('nameModal').classList.remove('active');
          loadChatDB();
          if(chatDB.order.length && !currentChatId) switchChat(chatDB.order[0]);
          else if(!currentChatId) { const nid = createNewChat(); switchChat(nid); }
          addMessageToChat(currentChatId, `Hello ${name}. I am YUWANI AI, a neutral assistant. I strive to be factual and unbiased. Ask me anything — about Nepal (area: 147,516 km²), technology, or general knowledge.`, 'bot', null);
        } else alert("Enter name");
      };
    } else {
      document.getElementById('greetingDisplay').innerHTML = `👤 ${escapeHtml(currentUserName)}`;
      loadChatDB();
      if(chatDB.order.length && !currentChatId) switchChat(chatDB.order[0]);
      else if(!currentChatId) { const nid = createNewChat(); switchChat(nid); }
    }
  }
  initTheme();
  initUser();
</script>
</body>
